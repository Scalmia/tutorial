<body class="morning"> <!-- 재사용 가능한 배경 스타일 -->

    <a href="index.html" class="back-link">⬅ 시계 화면으로 돌아가기</a>

    <header style="text-align: center; color: #333; margin-top: 60px; padding: 0 20px;">
        <h1>인공지능 동물상 테스트</h1>
        <p style="font-size: 1.1rem; max-width: 600px; margin: 10px auto; line-height: 1.6;">
            강아지 상일까, 고양이 상일까? AI가 당신의 얼굴 사진을 분석하여 어떤 동물과 가장 닮았는지 알려줍니다. 지금 바로 테스트해 보세요!
        </p>
    </header>

    <main style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 50px;">
        <section class="animal-test-container" style="margin-top: 30px;">
            <h2>📸 사진 업로드 및 분석</h2>
            <div style="font-size: 0.95rem; opacity: 0.9; margin-bottom: 25px; line-height: 1.5;">
                아래 버튼을 눌러 정면이 잘 나온 사진을 업로드해 주세요.<br>
                <strong>※ 업로드된 사진은 서버에 저장되지 않으며, 오직 브라우저 내에서 얼굴을 분석하는 데만 사용됩니다. 안심하고 사용하세요!</strong>
            </div>
            
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
            <label for="imageUpload" class="upload-btn">사진 업로드 하기</label>
            
            <div id="image-preview" style="margin-top: 25px; width: 100%; display: flex; justify-content: center;"></div>
            
            <div id="result-area" style="width: 100%; margin-top: 25px; display: none;">
                <h3 style="margin-bottom: 15px;">분석 결과</h3>
                <div id="label-container"></div>
                <p style="margin-top: 15px; font-size: 0.85rem; color: #555;">
                    구글의 최신 머신러닝 기술(Teachable Machine)을 활용하여 결과를 도출합니다. 결과는 재미로만 즐겨주세요!
                </p>
            </div>
        </section>
    </main>

    <!-- Teachable Machine Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/XcoJq152e/";
        let model, labelContainer, maxPredictions;

        // 뒤로 돌아가기 버튼을 위해서 배경 transition을 초기화합니다.
        document.body.style.transition = 'none';

        async function initModel() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) { 
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        // Initialize the model when the page loads
        window.addEventListener('load', initModel);

        const imageUpload = document.getElementById('imageUpload');
        const imagePreview = document.getElementById('image-preview');

        imageUpload.addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    // Update preview and clear previous results
                    imagePreview.innerHTML = '<img src="' + e.target.result + '" alt="업로드된 사진 미리보기" style="max-width: 100%; max-height: 400px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);">';
                    document.getElementById("result-area").style.display = "block";
                    labelContainer.innerHTML = "<div style='background:transparent;box-shadow:none;text-align:center;'>분석 중입니다... ⏳</div>";

                    // Create an image element for prediction
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = async function() {
                        // Re-initialize label containers
                        labelContainer.innerHTML = '';
                        for (let i = 0; i < maxPredictions; i++) { 
                            labelContainer.appendChild(document.createElement("div"));
                        }
                        await predict(img);
                    }
                }
                reader.readAsDataURL(file);
            }
        });

        async function predict(imageElement) {
            const prediction = await model.predict(imageElement);
            // Sort predictions by probability
            prediction.sort((a, b) => parseFloat(b.probability) - parseFloat(a.probability));

            for (let i = 0; i < maxPredictions; i++) {
                const pct = Math.round(prediction[i].probability * 100);
                const classPrediction =
                    `<span>${prediction[i].className}</span> <span>${pct}%</span>`;
                
                labelContainer.childNodes[i].innerHTML = classPrediction;
                // Add a visual bar background based on percentage
                labelContainer.childNodes[i].style.background = `linear-gradient(to right, rgba(255, 154, 158, 0.4) ${pct}%, rgba(255, 255, 255, 0.8) ${pct}%)`;
            }
        }
    </script>
