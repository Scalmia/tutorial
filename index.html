<!-- 30분 추가 -->
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간 여행 시계</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="morning">

    <div id="time-display">08:00</div>
    <input type="range" id="time-slider" min="0" max="1439" value="480">

    <!-- 제휴 문의 폼 -->
    <div class="contact-form-container">
        <h3>🤝 제휴 문의</h3>
        <form action="https://formspree.io/f/maqpeelq" method="POST">
            <label>
              이메일 주소
              <input type="email" name="email" placeholder="example@email.com" required>
            </label>
            <label>
              문의 내용
              <textarea name="message" rows="3" placeholder="제휴 및 문의 내용을 자유롭게 입력해주세요." required></textarea>
            </label>
            <button type="submit">문의 보내기</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
