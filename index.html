<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시간 여행 시계</title>
  <link rel="stylesheet" href="style.css">

  <!-- Google Adsense -->
  <meta name="google-adsense-account" content="ca-pub-8409907744414724">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8409907744414724"
     crossorigin="anonymous"></script>

<body class="morning">

  <header style="text-align: center; color: white; margin-top: 30px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);">
      <h1>시간 여행 시계</h1>
      <p style="font-size: 1.2rem; max-width: 600px; margin: 0 auto 20px auto; padding: 0 20px;">
          이 웹사이트는 시간에 따라 변하는 아름다운 배경을 시뮬레이션합니다. 아래 슬라이더를 조정하여 아침, 점심, 저녁의 분위기를 마음껏 느껴보세요!
      </p>
  </header>

  <main style="display: flex; flex-direction: column; align-items: center; width: 100%;">
      <section style="text-align: center; margin-bottom: 40px; background: rgba(255,255,255,0.2); padding: 30px; border-radius: 15px; backdrop-filter: blur(10px); width: 80%; max-width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
          <h2>🕒 시간 시뮬레이터</h2>
          <div id="time-display">08:00</div>
          <input type="range" id="time-slider" min="0" max="1439" value="480">
          <p style="margin-top: 20px; font-size: 0.95rem; opacity: 0.9;">
              슬라이더를 좌우로 움직이면 시간이 흐르면서 하늘의 색깔이 변하는 것을 관찰할 수 있습니다.<br>
              하루의 다양한 시간대를 경험하며 멋진 배경화면을 감상해 보세요.
          </p>
      </section>

      <!-- 동물상 테스트로 이동하는 버튼 -->
      <nav class="animal-test-link-container" style="margin-bottom: 40px;">
          <a href="animal.html" class="animal-test-link">🐶 인공지능 동물상 테스트 하러 가기 🐱</a>
      </nav>

  <!-- 제휴 문의 폼 -->
  <div class="contact-form-container">
    <h3>🤝 제휴 문의</h3>
    <form action="https://formspree.io/f/maqpeelq" method="POST">
      <label>
        이메일 주소
        <input type="email" name="email" placeholder="example@email.com" required>
      </label>
      <label>
        문의 내용
        <textarea name="message" rows="3" placeholder="제휴 및 문의 내용을 자유롭게 입력해주세요." required></textarea>
      </label>
      <button type="submit">문의 보내기</button>
    </form>
  </div>
